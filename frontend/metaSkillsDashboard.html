<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Governance OS Meta-Skills Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fa; margin: 20px; }
    h1 { text-align: center; color: #333; }
    .cluster { margin-bottom: 30px; }
    .cluster h2 { color: #444; border-bottom: 2px solid #ccc; }
    .skill-card {
      background: #fff; border-radius: 8px; padding: 10px;
      margin: 10px 0; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .active { color: green; font-weight: bold; }
    .inactive { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Governance OS Meta-Skills Dashboard</h1>

  <div class="cluster">
    <h2>Self-Management</h2>
    <div class="skill-card">Integrity → <span class="active">🟢 Active</span></div>
    <div class="skill-card">Adapting → <span class="inactive">🔴 Inactive</span></div>
    <div class="skill-card">Initiative → <span class="active">🟢 Active</span></div>
  </div>

  <div class="cluster">
    <h2>Social Intelligence</h2>
    <div class="skill-card">Communicating → <span class="active">🟢 Active</span></div>
    <div class="skill-card">Collaborating → <span class="inactive">🔴 Inactive</span></div>
    <div class="skill-card">Leading → <span class="active">🟢 Active</span></div>
  </div>

  <div class="cluster">
    <h2>Innovation</h2>
    <div class="skill-card">Curiosity → <span class="active">🟢 Active</span></div>
    <div class="skill-card">Creativity → <span class="inactive">🔴 Inactive</span></div>
    <div class="skill-card">Critical Thinking → <span class="active">🟢 Active</span></div>
  </div>
</body>
</html>
