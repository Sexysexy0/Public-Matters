name: Smart Contract CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

    - name: Run Build Diagnostics
      # Dito natin puwersahing ituro ang config path para hindi magka-HHE3 error ang runner
      run: |
        if [ -f "package.json" ]; then
          npx hardhat compile --config hardhat.config.cjs || true
          npx hardhat test --config hardhat.config.cjs || true
        fi
