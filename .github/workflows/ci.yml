name: CI

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Foundry
        uses: ethereum/setup-foundry@v1
        with:
          version: latest

      - name: Cache Foundry
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            lib
          key: ${{ runner.os }}-foundry-${{ hashFiles('**/foundry.toml') }}

      - name: Install dependencies
        run: |
          forge install || true
          forge update || true

      - name: Format
        run: forge fmt --check

      - name: Run tests
        run: forge test -vv

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-test-logs
          path: ./out || .
