name: Deploy Contracts

on:
  workflow_dispatch:   # manual trigger
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run tests
        run: forge test --gas-report

      - name: Run coverage
        run: forge coverage --report lcov

      - name: Run gas snapshot
        run: forge snapshot --snap gas-snapshot.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: gas-snapshot.txt

      - name: Run deployment script (Goerli)
        env:
          RPC_URL: ${{ secrets.GOERLI_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.GOERLI_PRIVATE_KEY }}
          DEST_ADDR: ${{ secrets.DEST_ADDR }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url $RPC_URL \
            --private-key $PRIVATE_KEY \
            --broadcast

      - name: Verify contract on Goerli
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          forge verify-contract \
            --compiler-version v0.8.30 \
            --chain-id 5 \
            --etherscan-api-key $ETHERSCAN_API_KEY \
            DEPLOYED_CONTRACT_ADDRESS \
            src/YourContract.sol:YourContract

      - name: Run deployment script (Mainnet)
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DEST_ADDR: ${{ secrets.DEST_ADDR }}
        run: |
          forge script script/Deploy.s.sol:Deploy \
            --rpc-url $RPC_URL \
            --private-key $PRIVATE_KEY \
            --broadcast

      - name: Verify contract on Mainnet
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          forge verify-contract \
            --compiler-version v0.8.30 \
            --chain-id 1 \
            --etherscan-api-key $ETHERSCAN_API_KEY \
            DEPLOYED_CONTRACT_ADDRESS \
            src/YourContract.sol:YourContract
