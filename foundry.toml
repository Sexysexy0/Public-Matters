[profile.default]
optimizer = true
optimizer_runs = 200
via_ir = false
ignored_error_codes = [2072, 3860, 5574]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Production deployment profile (max runtime optimization)
[profile.production]
optimizer = true
optimizer_runs = 10000
via_ir = true
ignored_error_codes = [2072, 3860, 5574]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Size optimization profile (for contracts near limit)
[profile.size]
optimizer = true
optimizer_runs = 1
via_ir = true
ignored_error_codes = [2072, 3860, 5574]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# CI/Testing profile (fast compilation)
[profile.ci]
optimizer = false
via_ir = false
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

[profile.default.lint]
ignore = [
    "unaliased-plain-import",
    "asm-keccak256",
    "screaming-snake-case-const",
    "unsafe-cheatcode"
]
